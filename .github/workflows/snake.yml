name: Generate Snake

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *' # Executa diariamente à meia-noite

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: YasminTrembulack
          outputs: |
            github-snake.svg?color_snake=magenta&color_dots=#e1bee7,#ce93d8,#ba68c8,#ab47bc,#8e24aa
            github-snake-dark.svg?color_snake=magenta&color_dots=#e1bee7,#ce93d8,#ba68c8,#ab47bc,#8e24aa
            ocean.gif?color_snake=magenta&color_dots=#e1bee7,#ce93d8,#ba68c8,#ab47bc,#8e24aa
